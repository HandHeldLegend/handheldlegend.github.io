<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCU Skin Designer - Final v7</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1a1a1a;
            --accent-color: #4f46e5;
            --success-color: #10b981;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* Standard Controls */
        .controls {
            background: var(--panel-color);
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .row-header { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #888; }
        
        input[type="number"] {
            background: var(--input-bg);
            border: 1px solid #444;
            color: var(--success-color);
            padding: 3px 6px;
            border-radius: 4px;
            width: 65px;
            font-family: monospace;
        }

        .upload-zone {
            grid-column: 1 / -1;
            border: 2px dashed #444;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .upload-zone.dragover {
            border-color: var(--accent-color);
            background: rgba(79, 70, 229, 0.12);
        }

        /* The Stage */
        .stage {
            position: relative;
            width: 100%;
            height: 750px;
            background: #111;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Keep background within stage */
            border: 1px solid #333;
        }

        #gamepadBg {
            position: absolute;
            width: 1400px; 
            height: 1000px;
            background-image: url('gcu_background.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
        }

        .canvas-container {
            position: relative;
            z-index: 2;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        #exportBtn {
            grid-column: 1 / -1;
            background: var(--success-color);
            color: white; border: none; padding: 12px; border-radius: 6px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Dev Console */
        #devConsole {
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.95);
            padding: 15px; border: 1px solid #ff00ff; border-radius: 8px;
            display: none; z-index: 1000; width: 250px;
        }

        #mobileWarning {
            display: none;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            margin: 20px 0;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #b45309;
            background: #2b1d0e;
            color: #fde68a;
            font-weight: 600;
            line-height: 1.5;
        }

        #dpiWarning {
            grid-column: 1 / -1;
            display: none;
            box-sizing: border-box;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #b45309;
            background: #2b1d0e;
            color: #fde68a;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="mobileWarning">
        Mobile is not fully supported for this tool. Please use a desktop browser for accurate scaling and print output.
    </div>

    <div class="controls">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('artUpload').click()">
            <span style="color:var(--accent-color)">FILE:</span> CLICK OR DRAG TO UPLOAD DESIGN (.PNG, .SVG)
            <input type="file" id="artUpload" accept="image/png,image/svg+xml,.svg" style="display:none">
        </div>

        <div id="dpiWarning"></div>

        <div class="control-group" style="grid-column: 1/-1; flex-direction: row; align-items: center;">
            <input type="checkbox" id="showGuides" style="width:18px; height:18px;">
            <label for="showGuides" style="margin-left:8px; text-transform: none; color:#eee;">Show Center Guides</label>
        </div>

        <div class="control-group">
            <div class="row-header"><label>Scale</label><input type="number" id="nScale" step="0.01" value="1.00"></div>
            <input type="range" id="rScale" min="0.01" max="5" step="0.01" value="1">
        </div>

        <div class="control-group">
            <div class="row-header"><label>Pos X</label><input type="number" id="nX" value="0"></div>
            <input type="range" id="rX" min="-1000" max="1000" value="0">
        </div>

        <div class="control-group">
            <div class="row-header"><label>Pos Y</label><input type="number" id="nY" value="0"></div>
            <input type="range" id="rY" min="-1000" max="1000" value="0">
        </div>

        <button id="exportBtn">Export 600DPI Print (Clean)</button>
    </div>

    <div class="stage">
        <div id="gamepadBg"></div>
        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <div id="devConsole">
        <h4 style="color:#ff00ff; margin:0 0 10px 0;">DEV ALIGNMENT</h4>
        <label>BG X: <span id="vBgX">0</span></label><input type="range" id="rBgX" min="-1000" max="1000" value="0" style="width:100%">
        <label>BG Y: <span id="vBgY">390</span></label><input type="range" id="rBgY" min="-1000" max="1000" value="390" style="width:100%">
        <label>BG Size: <span id="vBgSize">204</span></label><input type="range" id="rBgSize" min="10" max="500" value="204" style="width:100%">
    </div>

    <canvas id="exportCanvas" style="display:none"></canvas>

<script>
    // --- USER DEFAULTS ---
    const ALIGN_DEF = { x: -1, y: 390, s: 154 };

    const MM_W = 90, MM_H = 42, DPI_WS = 360, DPI_EXP = 600, MIN_SOURCE_DPI = 600, IN_MM = 25.4;
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const bg = document.getElementById('gamepadBg');
    const dpiWarning = document.getElementById('dpiWarning');
    const uploadZone = document.getElementById('uploadZone');
    const artUpload = document.getElementById('artUpload');
    const scaleRange = document.getElementById('rScale');
    const scaleNum = document.getElementById('nScale');
    const MIN_SCALE = parseFloat(scaleRange.min);
    const MAX_SCALE_DEFAULT = parseFloat(scaleRange.max);

    const wsW = Math.round((MM_W / IN_MM) * DPI_WS);
    const wsH = Math.round((MM_H / IN_MM) * DPI_WS);
    canvas.width = wsW; canvas.height = wsH;

    let thickImg = new Image(), userArt = null;
    let state = { x: wsW/2, y: wsH/2, s: 1 };
    let maxAllowedScale = MAX_SCALE_DEFAULT;

    function isMobileDevice() {
        const ua = navigator.userAgent || '';
        const hasMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        const likelyTouchLayout = window.matchMedia('(max-width: 900px)').matches && window.matchMedia('(pointer: coarse)').matches;
        return hasMobileUA || likelyTouchLayout;
    }

    function setMobileUnsupportedUI() {
        document.getElementById('mobileWarning').style.display = 'block';
        document.querySelector('.controls').style.display = 'none';
        document.querySelector('.stage').style.display = 'none';
    }

    function clampScale(value) {
        return Math.max(MIN_SCALE, Math.min(maxAllowedScale, value));
    }

    function setScale(value) {
        const clamped = clampScale(value);
        state.s = clamped;
        scaleRange.value = clamped.toFixed(2);
        scaleNum.value = clamped.toFixed(2);
        draw();
    }

    function setScaleLimit(maxScale) {
        maxAllowedScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE_DEFAULT, maxScale));
        scaleRange.max = maxAllowedScale.toFixed(2);
        setScale(state.s);
    }

    function showDpiWarning(message) {
        dpiWarning.style.display = 'block';
        dpiWarning.textContent = message;
    }

    function hideDpiWarning() {
        dpiWarning.style.display = 'none';
        dpiWarning.textContent = '';
    }

    function getResolutionBasedDpi(img) {
        // Estimate source DPI from pixel resolution against print size.
        const widthInches = MM_W / IN_MM;
        const heightInches = MM_H / IN_MM;
        const dpiX = img.width / widthInches;
        const dpiY = img.height / heightInches;
        return Math.min(dpiX, dpiY);
    }

    window.onload = () => {
        if (isMobileDevice()) {
            setMobileUnsupportedUI();
            return;
        }

        // Init Dev Sliders
        document.getElementById('rBgX').value = ALIGN_DEF.x;
        document.getElementById('rBgY').value = ALIGN_DEF.y;
        document.getElementById('rBgSize').value = ALIGN_DEF.s;
        updateBg();

        thickImg.src = 'gcu_thick_bg_360dpi.png';
        thickImg.onload = draw;
    };

    function updateBg() {
        const x = document.getElementById('rBgX').value;
        const y = document.getElementById('rBgY').value;
        const s = document.getElementById('rBgSize').value;
        bg.style.transform = `translate(${x}px, ${y}px) scale(${s/100})`;
        document.getElementById('vBgX').innerText = x;
        document.getElementById('vBgY').innerText = y;
        document.getElementById('vBgSize').innerText = s;
    }

    // --- ART UI SYNC ---
    function sync(rangeId, numId, prop) {
        const r = document.getElementById(rangeId);
        const n = document.getElementById(numId);
        const update = (val) => {
            if (prop === 's') setScale(parseFloat(val));
            if (prop === 'x') state.x = (wsW/2) + parseInt(val);
            if (prop === 'y') state.y = (wsH/2) + parseInt(val);
            if (prop !== 's') draw();
        };
        r.oninput = () => { n.value = r.value; update(r.value); };
        n.oninput = () => { r.value = n.value; update(n.value); };
    }

    sync('rScale', 'nScale', 's');
    sync('rX', 'nX', 'x');
    sync('rY', 'nY', 'y');

    document.getElementById('showGuides').onchange = draw;
    document.getElementById('rBgX').oninput = updateBg;
    document.getElementById('rBgY').oninput = updateBg;
    document.getElementById('rBgSize').oninput = updateBg;

    window.onkeydown = (e) => { if(e.key.toLowerCase()==='d'){ const d=document.getElementById('devConsole'); d.style.display=d.style.display==='block'?'none':'block';}};

    function handleImportedFile(file) {
        if (!file) return;

        const fileName = file.name || '';
        const fileType = file.type || '';
        const isSvg = fileType === 'image/svg+xml' || fileName.toLowerCase().endsWith('.svg');
        const isPng = fileType === 'image/png' || fileName.toLowerCase().endsWith('.png');
        if (!isSvg && !isPng) {
            showDpiWarning('Unsupported file type. Please upload PNG or SVG.');
            return;
        }

        const reader = new FileReader();
        new Promise((resolve) => {
            reader.onload = (ev) => resolve(ev.target.result);
            reader.readAsDataURL(file);
        }).then((dataUrl) => {
            const img = new Image();
            img.onload = () => {
                userArt = img;

                if (isSvg) {
                    setScaleLimit(MAX_SCALE_DEFAULT);
                    setScale(1);
                    hideDpiWarning();
                } else {
                    const detectedDpi = getResolutionBasedDpi(img);
                    const safeScale = detectedDpi / MIN_SOURCE_DPI;
                    setScaleLimit(safeScale);
                    if (detectedDpi < MIN_SOURCE_DPI) {
                        setScale(safeScale);
                        showDpiWarning(`This image resolution provides about ${detectedDpi.toFixed(0)} DPI for the print area, below the recommended ${MIN_SOURCE_DPI} DPI. It has been auto-scaled to ${safeScale.toFixed(2)}x to maintain ${MIN_SOURCE_DPI} DPI effective quality, and scaling above this limit is disabled.`);
                    } else {
                        setScale(1);
                        hideDpiWarning();
                    }
                }

                draw();
            };
            img.src = dataUrl;
        });
    }

    artUpload.onchange = (e) => {
        handleImportedFile(e.target.files[0]);
        artUpload.value = '';
    };

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files[0] : null;
        handleImportedFile(file);
    });

    function draw() {
        ctx.clearRect(0, 0, wsW, wsH);
        if (userArt) {
            ctx.save();
            ctx.translate(state.x, state.y);
            ctx.scale(state.s, state.s);
            ctx.drawImage(userArt, -userArt.width/2, -userArt.height/2);
            ctx.restore();
        }
        if (document.getElementById('showGuides').checked) {
            ctx.save();
            ctx.strokeStyle = 'cyan';
            ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(wsW/2, 0); ctx.lineTo(wsW/2, wsH); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, wsH/2); ctx.lineTo(wsW, wsH/2); ctx.stroke();
            ctx.restore();
        }
        if (thickImg.complete) ctx.drawImage(thickImg, 0, 0, wsW, wsH);
    }

    // --- DPI INJECTION & EXPORT ---
    function injectDPI(blob) {
        return blob.arrayBuffer().then(buffer => {
            const ppm = Math.round(600 * 39.3701);
            const phys = new Uint8Array([0,0,0,9,112,72,89,115, (ppm>>24)&255,(ppm>>16)&255,(ppm>>8)&255,ppm&255, (ppm>>24)&255,(ppm>>16)&255,(ppm>>8)&255,ppm&255, 1, 0,0,0,0]);
            return new Blob([buffer.slice(0,33), phys, buffer.slice(33)], {type:'image/png'});
        });
    }

    document.getElementById('exportBtn').onclick = () => {
        const eCanvas = document.getElementById('exportCanvas');
        const eCtx = eCanvas.getContext('2d');
        const eW = Math.round((MM_W / IN_MM) * DPI_EXP);
        const eH = Math.round((MM_H / IN_MM) * DPI_EXP);
        eCanvas.width = eW; eCanvas.height = eH;

        const r = DPI_EXP / DPI_WS;
        eCtx.clearRect(0,0,eW,eH);
        if (userArt) {
            eCtx.save();
            eCtx.translate(state.x * r, state.y * r);
            eCtx.scale(state.s * r, state.s * r);
            eCtx.drawImage(userArt, -userArt.width/2, -userArt.height/2);
            eCtx.restore();
        }
        eCanvas.toBlob((b) => {
            injectDPI(b).then(final => {
                const url = URL.createObjectURL(final);
                const a = document.createElement('a');
                a.download = `GCU_600DPI_Print.png`;
                a.href = url; a.click();
            });
        }, 'image/png');
    };
</script>
</body>
</html>
