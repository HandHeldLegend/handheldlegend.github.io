<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoja2 Config</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/modules.css">
</head>

<body>
    <div class="app-container">
        <div class="app-header-container">
            <div class="app-header">
                <div class="center-buttons">

                    <div class="ht-container">
                        <tristate-button 
                            id="connect-button" 
                            width="74"
                            off-text="Connect" 
                            on-text="Disconnect"
                            off-to-on-text="..."
                            on-to-off-text="Disconnect"
                        ></tristate-button>
                        <div class="header-tooltip" tooltip="If you have trouble connecting, try holding A or South button during plug-in. To install HOJA on a blank board, put it in BOOTSEL and choose the RPI-RP2 / Pico bootloader device.">?</div>
                    </div>

                    <single-shot-button id="save-button" state="disabled" ready-text="Save" disabled-text="Save"
                        pending-text="Saving..."
                    ></single-shot-button>

                    <single-shot-button id="changelog-button" state="ready" ready-text="What's New?" disabled-text="What's New?"
                        pending-text="What's New?"
                    ></single-shot-button>

                    <button visible="false" id="debug-button" class="debug-button" data-active="false">
                        Debug: FW
                    </button>

                </div>

                
                <button visible="false" id="app-install-button" class="install-button">
                    Install
                </button>
            </div>

            <div visible="false" id="notif-msg-box" class="header-msg-box">

            </div>

            <div visible="false" id="fw-update-box" class="header-msg-box fw-update-box">
                <h2 id="fw-update-title">Update Available</h2>
                <p id="fw-update-guide">Click Bootloader to reset your controller into update mode.</p>

                <div id="fw-install-picker" class="fw-install-picker" hidden>
                    <label for="fw-device-select">Select your device</label>
                    <select id="fw-device-select">
                        <option value="">Loading devices...</option>
                    </select>
                </div>

                <div id="fw-uf2-tips" class="fw-uf2-tips" hidden>
                    <ol>
                        <li>In the folder dialog, open the drive named <strong>RPI-RP2</strong></li>
                        <li>Select that drive folder (you should see <strong>INFO_UF2.TXT</strong> inside)</li>
                        <li>Click Select / Open - do not pick Downloads or Documents</li>
                    </ol>
                </div>

                <div class="progress-info">
                    <span class="status-text" id="statusText">Ready</span>
                    <span class="percentage" id="percentage">0%</span>
                </div>

                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="app-row">
                    <single-shot-button id="update-button" state="ready" ready-text="Update" disabled-text="..."
                        pending-text="Working..." failure-text="Failed" success-text="Done"
                    ></single-shot-button>
                    <single-shot-button id="exit-bootloader-button" state="ready" ready-text="Restart" disabled-text="..."
                        pending-text="Restarting..." failure-text="Failed" success-text="Done"
                    ></single-shot-button>
                    <single-shot-button id="dismiss-fw-button" state="ready" ready-text="Dismiss" disabled-text="..."
                        pending-text="..." failure-text="..." success-text="..."
                    ></single-shot-button>
                </div>
            </div>

        </div>
        <div class="swap-space">

            <div id="module-container">
                <div id="module-header">
                    <button id="back-button">←</button>
                    <h1 id="app-title">APP TITLE</h1>
                </div>
                <div id="module-content-container">
                    <div id="module-content"></div>
                </div>
            </div>

            <div id="app-grid-container">
                <div id="app-grid"></div>
            </div>

        </div>
    </div>

    <script>

        const moduleContent = document.getElementById('module-content-container');
        const moduleHeader = document.getElementById('module-header');

        moduleContent.addEventListener('scroll', () => {
            if (moduleContent.scrollTop > 0) {
                moduleHeader.setAttribute("shadow", "true");
            } else {
                moduleHeader.setAttribute("shadow", "false");
            }
        });
    </script>

    <script src="./js/app.js" type="module"></script>
    
</body>

</html>
